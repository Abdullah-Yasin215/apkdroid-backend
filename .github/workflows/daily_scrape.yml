name: Daily App Scrape
on:
  schedule:
    - cron: '0 0 * * *' # Runs at midnight UTC every day
  workflow_dispatch: # Allows you to run it manually from GitHub Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Scraper API
        run: |
          curl -X POST "https://apkdroid-backend-production.up.railway.app/api/v1/admin/scrape/trigger?source=all&limit=50" \
          -H "X-Admin-Key: ${{ secrets.ADMIN_API_KEY }}"
